server {
    listen 8080;
    server_name localhost;
    
    # Disable absolute redirects to prevent issues with port 8080 and HTTP vs HTTPS
    absolute_redirect off;
    port_in_redirect off;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy for Google Generative AI APIs (Gemini/Veo)
    location /google-api/ {
        proxy_pass https://generativelanguage.googleapis.com/;
        proxy_set_header Host generativelanguage.googleapis.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Preserve the original request method (POST, etc.)
        proxy_method $request_method;
        proxy_pass_request_headers on;
        
        # Transparent proxying for chunked transfers if needed
        proxy_buffering off;
        proxy_ssl_server_name on;
        proxy_ssl_session_reuse off;
    }

    # Optional: Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
