<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | ADK Gemini Live API Toolkit</title>
    <!-- Redirect to /static/livekit.html after 3 seconds -->
    <meta http-equiv="refresh" content="3;url=/static/livekit.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-glow: rgba(99, 102, 241, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-glow: #6366f1;
            --accent-glow-secondary: #d946ef;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background elements */
        .bg-glow-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: -10%;
            left: -10%;
            opacity: 0.3;
            filter: blur(80px);
            pointer-events: none;
            animation: float 12s infinite alternate ease-in-out;
        }

        .bg-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow-secondary) 0%, transparent 70%);
            bottom: -15%;
            right: -10%;
            opacity: 0.25;
            filter: blur(100px);
            pointer-events: none;
            animation: float 15s infinite alternate-reverse ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 540px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), 
                        0 0 40px var(--glass-glow);
            position: relative;
            z-index: 10;
            transform: translateY(0);
            animation: cardAppear 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardAppear {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(217, 70, 239, 0.2) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            position: relative;
        }

        .icon-container::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--accent-glow) 0%, var(--accent-glow-secondary) 100%);
            z-index: -1;
            opacity: 0.4;
            filter: blur(8px);
        }

        .logo-svg {
            width: 40px;
            height: 40px;
            fill: #ffffff;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.85; }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .redirect-notice {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
            font-size: 0.9rem;
            color: #818cf8;
            font-weight: 500;
        }

        .loader-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loader-dots span {
            width: 6px;
            height: 6px;
            background-color: #818cf8;
            border-radius: 50%;
            animation: dotFlashing 1s infinite alternate;
        }

        .loader-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loader-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotFlashing {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .action-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border: none;
            border-radius: 14px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(79, 70, 229, 0.5),
                        0 0 20px rgba(124, 58, 237, 0.4);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .action-button:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: rgba(148, 163, 184, 0.4);
        }
    </style>
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="card">
        <div class="icon-container">
            <!-- Sleek SVG Logo representation -->
            <svg class="logo-svg" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
        </div>

        <h1>Welcome to ADK</h1>
        <p>You have successfully reached the Gemini Live API Toolkit demo server. To get started, please invoke the LiveKit integration page.</p>

        <div class="redirect-notice">
            <span>Redirecting to livekit.html</span>
            <div class="loader-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <a href="/static/livekit.html" class="action-button">Go to LiveKit Demo</a>

        <div class="footer-text">
            ADK Gemini Live API Toolkit &bull; WebRTC client
        </div>
    </div>

    <script>
        // Fallback JavaScript redirection
        setTimeout(function() {
            window.location.href = "/static/livekit.html";
        }, 3000);
    </script>
</body>
</html>
